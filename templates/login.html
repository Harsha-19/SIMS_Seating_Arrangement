{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <title>Login | SIMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Theme Detection Script (Prevents Flicker) -->
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.classList.toggle('dark', theme === 'dark');
        })();
    </script>
    <!-- Tailwind Configuration for Dark Mode -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#0A0A0A',
                            900: '#0F0F0F',
                            850: '#111111',
                            800: '#1A1A1A',
                            750: '#222222'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="h-full bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
    <!-- Fluid Background Gradient -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div
            class="absolute -top-1/4 -right-1/4 w-[60%] h-[60%] bg-blue-100/30 dark:bg-blue-900/10 rounded-full blur-[120px]">
        </div>
        <div
            class="absolute -bottom-1/4 -left-1/4 w-[60%] h-[60%] bg-blue-50/20 dark:bg-blue-900/5 rounded-full blur-[120px]">
        </div>
    </div>

    <!-- Floating Theme Toggle -->
    <div class="fixed top-8 right-8 z-50">
        <button id="theme-toggle"
            class="p-3 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border border-slate-200 dark:border-slate-800 rounded-2xl shadow-xl shadow-slate-200/20 dark:shadow-none text-slate-500 dark:text-slate-400 hover:scale-110 active:scale-95 transition-all group">
            <i data-lucide="sun" class="w-5 h-5 block dark:hidden"></i>
            <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
        </button>
    </div>

    <!-- Main Container -->
    <div class="min-h-screen flex items-center justify-center p-6 relative z-10">
        <div class="w-full max-w-[460px] animate-in fade-in zoom-in duration-700">

            <!-- Login Card -->
            <div
                class="bg-white dark:bg-slate-900 p-10 sm:p-12 rounded-[2.5rem] border border-slate-200/60 dark:border-slate-800 shadow-2xl shadow-slate-200/50 dark:shadow-none flex flex-col items-stretch overflow-hidden relative transition-all duration-500">

                <!-- Inner Branding Header -->
                <div class="text-center mb-10 flex flex-col items-center">
                    <div
                        class="inline-block w-40 mb-6 drop-shadow-sm hover:scale-105 transition-transform duration-500">
                        <img src="{% static 'img/logo.png' %}" alt="Soundarya Institute"
                            class="w-full h-auto object-contain">
                    </div>
                    <div class="space-y-1">
                        <h1 class="text-xl font-black text-slate-900 dark:text-white uppercase tracking-tighter italic">
                            Smart Institutional</h1>
                        <p
                            class="text-[10px] font-black text-blue-600 dark:text-blue-400 uppercase tracking-[0.4em] translate-x-1">
                            Management System</p>
                    </div>
                </div>

                <!-- Form Section -->
                <form class="space-y-6" action="/login/" method="POST">
                    {% csrf_token %}
                    <div class="space-y-2">
                        <label for="username"
                            class="block text-[10px] font-black uppercase text-slate-400 dark:text-slate-500 tracking-widest pl-1">Username</label>
                        <div class="relative group">
                            <i data-lucide="user"
                                class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
                            <input id="username" name="username" type="text" required
                                class="block w-full rounded-2xl border border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-950/50 py-4 pl-12 pr-4 text-sm text-slate-900 dark:text-white focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all placeholder:text-slate-300 dark:placeholder:text-slate-700 font-medium"
                                placeholder="Enter your username">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex items-center justify-between pl-1">
                            <label for="password"
                                class="block text-[10px] font-black uppercase text-slate-400 dark:text-slate-500 tracking-widest">Password</label>
                            <a href="#"
                                class="text-[9px] font-black uppercase text-blue-600 dark:text-blue-400 tracking-widest hover:text-blue-500 transition-colors">Forgot
                                Access?</a>
                        </div>
                        <div class="relative group">
                            <i data-lucide="lock"
                                class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
                            <input id="password" name="password" type="password" required
                                class="block w-full rounded-2xl border border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-950/50 py-4 pl-12 pr-4 text-sm text-slate-900 dark:text-white focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all placeholder:text-slate-300 dark:placeholder:text-slate-700 font-medium"
                                placeholder="••••••••">
                        </div>
                    </div>

                    <div class="pt-4">
                        <button type="submit"
                            class="flex w-full justify-center items-center gap-3 rounded-[1.25rem] bg-slate-900 dark:bg-white dark:text-slate-900 px-6 py-4.5 text-xs font-black uppercase tracking-[0.2em] text-white shadow-2xl shadow-slate-900/20 hover:bg-black dark:hover:bg-slate-100 focus:outline-none ring-offset-4 active:scale-[0.97] transition-all duration-300">
                            Log In
                            <i data-lucide="chevron-right" class="w-4 h-4"></i>
                        </button>
                    </div>
                </form>

                <!-- Footer Section (Integrated) -->
                <div class="mt-12 pt-10 border-t border-slate-100 dark:border-slate-800 text-center space-y-4">
                    <p
                        class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.3em] leading-relaxed">
                        Developed and Deployed by Harsha<br>
                        <span class="opacity-50">© 2026 Harsha</span>
                    </p>

                </div>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        // Theme Toggle Logic
        document.getElementById('theme-toggle')?.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            lucide.createIcons();
        });
    </script>
</body>

</html>
