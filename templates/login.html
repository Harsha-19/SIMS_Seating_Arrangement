{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">
    <title>Login | SIMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="h-full">
    <div class="flex min-h-full items-center justify-center p-6 sm:p-12">
        <div class="w-full max-w-md space-y-10">
            <div class="text-center group">
                <div class="inline-block w-full max-w-[280px] mb-8 group-hover:scale-105 transition-all duration-500">
                    <img src="{% static 'img/logo.png' %}" alt="Soundarya Institute" class="w-full h-auto">
                </div>
            </div>

            <!-- Login Card -->
            <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-xl shadow-slate-200/50">
                <form class="space-y-6" action="/login/" method="POST">
                    {% csrf_token %}
                    <div>
                        <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                        <div class="relative group">
                            <i data-lucide="user" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4.5 h-4.5 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                            <input id="username" name="username" type="text" required class="block w-full rounded-xl border border-slate-200 bg-slate-50/50 py-3 pl-11 pr-4 text-sm text-slate-900 focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all" placeholder="Enter your username">
                        </div>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
                            <a href="#" class="text-xs font-semibold text-blue-600 hover:text-blue-500 hover:underline underline-offset-4 decoration-2">Forgot password?</a>
                        </div>
                        <div class="relative group">
                            <i data-lucide="lock" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4.5 h-4.5 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                            <input id="password" name="password" type="password" required class="block w-full rounded-xl border border-slate-200 bg-slate-50/50 py-3 pl-11 pr-4 text-sm text-slate-900 focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all" placeholder="••••••••">
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500/20">
                            <label for="remember-me" class="ml-2 block text-xs font-medium text-slate-500 select-none">Remember for 30 days</label>
                        </div>
                    </div>

                    <div>
                        <button type="submit" class="flex w-full justify-center items-center gap-2 rounded-xl bg-slate-900 px-4 py-3.5 text-sm font-bold text-white shadow-xl shadow-slate-900/10 hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:ring-offset-2 active:scale-[0.98] transition-all duration-200">
                            Sign In
                            <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </div>
                </form>

                <div class="mt-10 text-center p-6 bg-slate-50/50 rounded-[2rem] border border-slate-100">
                    <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-4">Facing an issue?</p>
                    <a href="mailto:harshamt2005@gmail.com" class="inline-flex items-center gap-3 px-6 py-2.5 bg-white border border-slate-200 text-slate-900 rounded-xl text-xs font-black uppercase tracking-widest hover:border-blue-600 hover:text-blue-600 transition-all shadow-sm active:scale-95">
                        <i data-lucide="help-circle" class="w-4 h-4 text-blue-600"></i>
                        Contact Harsha
                    </a>
                </div>
            </div>
            
            <p class="text-center text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] select-none">SIMS Smart Management • v1.0.4</p>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
